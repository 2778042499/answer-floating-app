name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: 验证环境并保存日志
        run: |
          set -x
          echo "=== OS ==="
          uname -a
          echo "=== JAVA ==="
          echo "JAVA_HOME="
          which java || echo "java not found"
          java -version 2>&1
          ls -la /bin/java 2>&1 || echo "JAVA_HOME/bin/java not found"
          echo "=== GRADLE WRAPPER ==="
          chmod -v +x gradlew
          ls -la gradlew gradle/wrapper/
          file gradlew
          echo "=== GRADLE WRAPPER JAR ==="
          ls -la gradle/wrapper/gradle-wrapper.jar
          file gradle/wrapper/gradle-wrapper.jar
          echo "=== TRY RUNNING GRADLEW ==="
          ./gradlew --version 2>&1
        shell: bash
        continue-on-error: true

      - name: 编译 Debug APK
        run: |
          set -x
          dos2unix gradlew 2>/dev/null || true
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        shell: bash
        continue-on-error: true

      - name: 保存全部构建日志
        if: always()
        run: |
          mkdir -p build-logs
          env > build-logs/env.txt
          find / -name "java" -type f 2>/dev/null | head -5 > build-logs/java-locations.txt
          find / -name "gradle-wrapper.jar" 2>/dev/null | head -5 > build-logs/jar-locations.txt
          ls -laR gradle/ > build-logs/gradle-dir.txt 2>&1 || true
        shell: bash

      - name: 上传日志和APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 构建输出
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            build-logs/
          if-no-files-found: warn
          compression-level: 0
