name: Build APK

# 每次推送代码到 main 分支时自动编译 APK
# 也支持在 GitHub 网页上手动触发
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 安装 Android SDK 并编译 APK
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"

      - name: 编译 Debug APK
        run: |
          # 给签名文件占位（debug 签名自动生成）
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug

      - name: 上传 APK（可直接用手机下载）
        uses: actions/upload-artifact@v4
        with:
          name: 答题悬浮助手-v1.0
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          compression-level: 0
