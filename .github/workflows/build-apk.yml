name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: 修复 CRLF 行尾
        run: |
          # Fix CRLF issues for shell scripts (common issue on Windows git clients)
          sed -i 's/\r$//' gradlew
          sed -i 's/\r$//' gradlew.bat
          chmod +x gradlew
        shell: bash

      - name: 编译 Debug APK
        run: |
          echo "=== Java Version ==="
          java -version 2>&1
          echo "=== Gradle Version ==="
          ./gradlew --version 2>&1
          echo "=== Build ==="
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
        shell: bash

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 答题悬浮助手-v1.0
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          compression-level: 0
