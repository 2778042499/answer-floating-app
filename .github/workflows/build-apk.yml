name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 验证 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 安装 Android SDK (v4)
        uses: android-actions/setup-android@v4.0.1

      - name: 验证环境
        run: |
          echo "JAVA_HOME="
          echo "ANDROID_HOME="
          which java
          java -version
          ls -la gradlew
          gradlew --version || echo "gradlew --version failed"
          chmod +x gradlew
          ./gradlew --version || echo "Direct gradlew failed"

      - name: 编译 Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 答题悬浮助手-v1.0
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          compression-level: 0
